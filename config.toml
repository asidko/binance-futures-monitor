# Default bfm config. The real file is auto-created at ~/.config/bfm/config.toml
# on first run; this copy documents the format. Fill in Telegram to push alerts
# there; otherwise alerts fall back to stdout (watch them live with `bfm monitor`).

# default provider when --provider is omitted: "telegram" | "stdout" | "file" | "callback"
default_provider = ""

# default conditions when --condition is omitted: a family ("closed" | "crosses"
# auto-pick direction; "above" | "below"), "closed-opposite" (color flip of the
# last closed candle), or a full name ("closed-above" | "closed-green").
# Comma-separated for several. Empty = both crosses and closed (auto direction).
default_condition = ""

[telegram]
bot_token = ""
chat_id = ""
