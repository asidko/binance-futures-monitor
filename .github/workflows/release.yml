name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04      # linux x86_64 (older glibc -> runs on more boxes)
          - os: ubuntu-22.04-arm  # linux arm64 (Pi, Graviton, ARM VPS)
          - os: macos-14          # macOS arm64 (Apple Silicon); Intel macs build from source
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run python scripts/build.py
      - uses: actions/upload-artifact@v4
        with:
          name: bfm-${{ matrix.os }}
          path: dist/bfm-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/bfm-*
          body: |
            ## Install

            One-liner (auto-detects OS/arch, installs to `~/.local/bin`):

            ```
            curl -fsSL https://raw.githubusercontent.com/asidko/binance-futures-monitor/main/install.sh | sh
            ```

            ### Manual

            Download the asset for your platform below, then:

            ```
            # user-local (no sudo) - make sure ~/.local/bin is on your PATH
            chmod +x bfm-* && mkdir -p ~/.local/bin && mv bfm-* ~/.local/bin/bfm

            # system-wide (sudo)
            chmod +x bfm-* && sudo mv bfm-* /usr/local/bin/bfm
            ```

            macOS: clear the Gatekeeper quarantine flag before first run:

            ```
            xattr -d com.apple.quarantine ~/.local/bin/bfm
            ```

            Then run `bfm --help`.
