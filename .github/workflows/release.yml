name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04      # older glibc -> runs on more Linux boxes
          - os: macos-14          # arm64 (Apple Silicon); Intel macs build from source
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run python scripts/build.py
      - uses: actions/upload-artifact@v4
        with:
          name: bfm-${{ matrix.os }}
          path: dist/bfm-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/bfm-*
