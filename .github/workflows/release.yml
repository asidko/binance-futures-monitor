name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    # the onefile unpack cache is keyed on the pyproject version; releasing a
    # tag that doesn't match it would serve users a stale cached payload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tag must match pyproject version
        run: |
          ver=$(grep -m1 '^version' pyproject.toml | cut -d'"' -f2)
          [ "${GITHUB_REF_NAME}" = "v${ver}" ] || { echo "tag ${GITHUB_REF_NAME} != pyproject v${ver}" >&2; exit 1; }

  build:
    needs: guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04      # linux x86_64 (older glibc -> runs on more boxes)
          - os: ubuntu-22.04-arm  # linux arm64 (Pi, Graviton, ARM VPS)
          - os: macos-14          # macOS arm64 (Apple Silicon); Intel macs build from source
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
      - run: uv sync --dev
      - run: uv run python build.py
      - name: smoke test the built binary
        run: |
          bin=$(ls dist/bfm-*)
          "$bin" --version
          "$bin" --help >/dev/null
      - uses: actions/upload-artifact@v7
        with:
          name: bfm-${{ matrix.os }}
          path: dist/bfm-*

  build-android:
    # Android is bionic, not glibc, and GitHub has no Android runner - build inside the Termux
    # image. Runs on a NATIVE arm64 runner so the aarch64 container needs no QEMU (emulation was
    # ~5-20x slower). Best-effort: a flake here must NOT block the linux/macOS release
    # (install.sh falls back to a source install when the asset is missing).
    needs: guard
    runs-on: ubuntu-22.04-arm
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: build in Termux (aarch64, native)
        run: |
          chmod -R a+w .
          nuitka_pin=$(grep -A2 'name = "nuitka"' uv.lock | grep -m1 version | cut -d'"' -f2)
          docker run --rm --privileged -v "$PWD":/build -w /build -e NUITKA_PIN="$nuitka_pin" \
            termux/termux-docker:aarch64 bash -c '
              set -e
              apt update -yq && apt install -yq python git clang binutils patchelf ldd ccache termux-elf-cleaner
              pip install --no-input "nuitka==$NUITKA_PIN" zstandard requests
              python build.py
            '
      - name: smoke test the built binary
        run: |
          docker run --rm --privileged -v "$PWD":/build -w /build \
            termux/termux-docker:aarch64 bash -c '
              bin=$(ls dist/bfm-android-*); "$bin" --version; "$bin" --help >/dev/null'
      - uses: actions/upload-artifact@v7
        with:
          name: bfm-android
          path: dist/bfm-android-*

  release:
    needs: [build, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: collect binaries and checksums
        run: |
          mkdir -p out
          find artifacts -type f -name 'bfm-*' -exec cp {} out/ \;
          cd out && sha256sum bfm-* > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          files: out/*
          draft: true  # publish only after every asset is attached, so `latest` never 404s
          name: ${{ github.ref_name }} - price-level alerts for Binance futures
          body: |
            **bfm** watches Binance USD-M futures and alerts you the moment price hits a level you set. One small binary runs a background daemon over all your watches. Each alert fires once, then the watch removes itself.

            ## Highlights
            - Single self-contained binary. No Python, no dependencies to install.
            - Alert channels: Telegram, a file, stdout, a webhook (callback URL), or any shell command (desktop popups via osascript/notify-send).
            - `bfm monitor` streams alerts live to your terminal, whatever channel a watch uses.
            - Auto-picks the alert direction from the current price; add several levels in one command.
            - Config and data sit in one place: `~/.config/bfm/config.toml`.

            ## Platforms
            - Linux x86_64 and arm64
            - macOS arm64 (Apple Silicon). On Intel Macs, build from source.
            - Android (Termux): `pkg install python`, then run the install line - arm64 gets a prebuilt binary, other arches install from source.

            ## Install

            Installs `bfm` to `~/.local/bin` (auto-detects OS/arch, verifies the SHA256 checksum):

            ```
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh -s -- --tag ${{ github.ref_name }}
            ```

            ### Manual

            Download the asset for your platform plus `SHA256SUMS`, verify, then install:

            ```
            sha256sum -c SHA256SUMS --ignore-missing      # macOS: shasum -a 256 -c

            # user-local (no sudo) - make sure ~/.local/bin is on your PATH
            chmod +x bfm-* && mkdir -p ~/.local/bin && mv bfm-* ~/.local/bin/bfm

            # system-wide (sudo)
            chmod +x bfm-* && sudo mv bfm-* /usr/local/bin/bfm
            ```

            macOS: clear the Gatekeeper quarantine flag before first run:

            ```
            xattr -d com.apple.quarantine ~/.local/bin/bfm
            ```

            ## Quickstart

            ```
            bfm add DOGEUSDT 0.08285     # alert when price reaches 0.08285
            bfm monitor                  # watch alerts live in this terminal
            ```

            Add your Telegram token to `~/.config/bfm/config.toml` to get pushed alerts instead of stdout.
      - name: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft=false
