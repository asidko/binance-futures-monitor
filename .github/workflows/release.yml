name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04      # linux x86_64 (older glibc -> runs on more boxes)
          - os: ubuntu-22.04-arm  # linux arm64 (Pi, Graviton, ARM VPS)
          - os: macos-14          # macOS arm64 (Apple Silicon); Intel macs build from source
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: bfm-${{ matrix.os }}
          path: dist/bfm-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/bfm-*
          name: ${{ github.ref_name }} - price-level alerts for Binance futures
          body: |
            **bfm** watches Binance USD-M futures and alerts you the moment price
            hits a level you set. One small binary runs a background daemon over
            all your watches. Each alert fires once, then the watch removes itself.

            ## Highlights
            - Single self-contained binary. No Python, no dependencies to install.
            - Alert channels: Telegram, a file, stdout, or a webhook (callback URL).
            - `bfm monitor` streams alerts live to your terminal, whatever channel a watch uses.
            - Auto-picks the alert direction from the current price; add several levels in one command.
            - Config and data sit in one place: `~/.config/bfm/config.toml`.

            ## Platforms
            - Linux x86_64 and arm64
            - macOS arm64 (Apple Silicon). On Intel Macs, build from source.

            ## Install

            One-liner (auto-detects OS/arch, installs to `~/.local/bin`):

            ```
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            Pin this exact version:

            ```
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh -s -- --tag ${{ github.ref_name }}
            ```

            ### Manual

            Download the asset for your platform below, then:

            ```
            # user-local (no sudo) - make sure ~/.local/bin is on your PATH
            chmod +x bfm-* && mkdir -p ~/.local/bin && mv bfm-* ~/.local/bin/bfm

            # system-wide (sudo)
            chmod +x bfm-* && sudo mv bfm-* /usr/local/bin/bfm
            ```

            macOS: clear the Gatekeeper quarantine flag before first run:

            ```
            xattr -d com.apple.quarantine ~/.local/bin/bfm
            ```

            ## Quickstart

            ```
            bfm add DOGEUSDT 0.08285     # alert when price reaches 0.08285
            bfm monitor                  # watch alerts live in this terminal
            ```

            Add your Telegram token to `~/.config/bfm/config.toml` to get pushed
            alerts instead of stdout.
